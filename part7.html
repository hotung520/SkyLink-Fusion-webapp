<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>路面漏洞上報</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background: #ffffff; color: #1e293b; }
        .input-focus:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
    </style>
</head>
<body className="p-6">
    <div className="flex flex-col h-screen p-6">
        <header className="mb-8">
            <h1 className="text-2xl font-black text-slate-800">路面漏洞回報</h1>
            <p className="text-sm text-slate-500 font-bold mt-1">協助優化城市低空與地面環境</p>
        </header>

        <div className="space-y-6 flex-1">
            <div>
                <label className="block text-sm font-black text-slate-700 mb-2">
                    <i className="fas fa-pen-to-square mr-2 text-blue-500"></i>情況描述
                </label>
                <textarea 
                    placeholder="請描述具體問題（如：某路段地磚鬆脫、缺少植被等）..." 
                    className="w-full h-32 p-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm input-focus transition-all resize-none"
                ></textarea>
            </div>

            <div>
                <label className="block text-sm font-black text-slate-700 mb-2">
                    <i className="fas fa-camera mr-2 text-blue-500"></i>現場照片
                </label>
                <div className="flex flex-col items-center justify-center w-full h-40 border-2 border-dashed border-slate-200 rounded-3xl bg-slate-50 hover:bg-slate-100 transition-colors cursor-pointer relative" onclick="document.getElementById('fileInput').click()">
                    <i className="fas fa-cloud-upload-alt text-3xl text-slate-300 mb-2"></i>
                    <p className="text-xs font-bold text-slate-400">點擊或拖拽照片至此</p>
                    <input type="file" id="fileInput" className="hidden" accept="image/*" />
                </div>
            </div>

            <button onclick="alert('報告已提交，感謝您的反饋！'); window.parent.postMessage({type: 'CLOSE_REPORT'}, '*');" 
                className="w-full py-4 bg-blue-600 text-white rounded-2xl font-black shadow-lg shadow-blue-200 active:scale-95 transition-transform">
                提交報告
            </button>
        </div>

        <footer className="mt-auto pb-6">
            <button onclick="window.parent.postMessage({type: 'CLOSE_REPORT'}, '*')" 
                className="w-full py-3 bg-slate-100 text-slate-500 rounded-2xl font-black text-sm flex items-center justify-center active:bg-slate-200 transition-colors">
                <i className="fas fa-arrow-left mr-2"></i> 放棄並退出
            </button>
        </footer>
    </div>

    <script>
        // 簡單的檔案預覽邏輯（可選）
        document.getElementById('fileInput').addEventListener('change', function(e) {
            if(e.target.files.length > 0) {
                alert('照片已選擇: ' + e.target.files[0].name);
            }
        });
    </script>
</body>
</html>
